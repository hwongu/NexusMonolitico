<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEditMode ? 'Editar Producto' : 'Nuevo Producto' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="message" class="alert alert-info">{{ message }}</div>

      <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" style="width: 100%;">
          <mat-label>ID</mat-label>
          <input matInput formControlName="idProducto">
        </mat-form-field>

        <mat-form-field appearance="fill" style="width: 100%;">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre">
        </mat-form-field>

        <mat-form-field appearance="fill" style="width: 100%;">
          <mat-label>Categoría</mat-label>
          <mat-select formControlName="idCategoria">
            <mat-option *ngFor="let category of categories" [value]="category.idCategoria">
              {{ category.nombre }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="fill" style="width: 100%;">
          <mat-label>Precio</mat-label>
          <input matInput type="number" formControlName="precio">
        </mat-form-field>

        <mat-form-field appearance="fill" style="width: 100%;">
          <mat-label>Stock</mat-label>
          <input matInput type="number" formControlName="stock">
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="!productForm.valid || submitted">
          {{ isEditMode ? 'Actualizar' : 'Registrar' }}
        </button>
        <button mat-button type="button" (click)="goBack()" class="ms-2">Volver</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
