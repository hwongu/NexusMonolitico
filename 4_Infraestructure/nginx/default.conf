# ==============================================================================
# Archivo: default.conf
# Descripción: 
# Configuración del servidor web Nginx para servir una aplicación Angular 
# desde un subdirectorio específico (/NexusFrontEnd).
# ==============================================================================

server {
    listen 80;
    server_name localhost;

    # Se define el bloque de ubicación para la ruta deseada
    location /NexusFrontEnd {
        # Se establece la raíz donde Nginx buscará las carpetas
        root /usr/share/nginx/html;
        index index.html;

        # Se intenta cargar el archivo exacto. Si no se encuentra, 
        # se redirige al index.html de la sub-ruta para que Angular maneje el 404.
        try_files $uri $uri/ /NexusFrontEnd/index.html;
    }

    # Redirección opcional: Si un usuario entra a la raíz, se le envía al frontend
    location = / {
        return 301 http://localhost/NexusFrontEnd;
    }
}